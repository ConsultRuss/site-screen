# =============================================================================
# Site Screen — suitability model configuration
# -----------------------------------------------------------------------------
# Every weight, breakpoint, exclusion, and lens lives here. The scoring pipeline
# reads this file and nothing is hard-coded, so a reviewer can see exactly how a
# parcel earns its score and re-tune without touching code. The values below are
# ILLUSTRATIVE, defensible defaults — not a production-tuned model.
#
# Scoring approach (see README "Methodology"):
#   normalize each criterion to 0-100  ->  weight  ->  sum  ->  rank.
# Normalization is "hybrid": anchored piecewise-linear for numeric criteria,
# lookup tables for categorical ones. Absolute (domain-anchored) breakpoints are
# used rather than dataset-relative min/max, so a parcel's score is reproducible
# and does not shift when parcels are added or removed.
# =============================================================================

study_area:
  counties: [Wilson, Karnes]
  state: TX
  parcel_min_acres: 50          # utility-scale siting floor

crs:
  storage: "EPSG:4326"          # WGS84 — what the web app consumes
  analysis: "EPSG:3083"         # NAD83 Texas Centric Albers Equal Area — area/distance math

# -----------------------------------------------------------------------------
# Hard exclusions + setbacks. Subtracted as absolute masks; what remains is the
# parcel's buildable acreage. (Acreage scoring keys off buildable, not gross.)
# -----------------------------------------------------------------------------
exclusions:
  fema_flood_zones: [A, AE, AH, AO, AR, A99, V, VE]   # SFHA high-risk zones (Zone X = minimal, NOT excluded)
  nwi_wetland_types: [palustrine, lacustrine, riverine]
  padus_gap_status: [1, 2, 3]          # protected lands
  slope_hard_exclude_pct: 12.0         # very steep -> unbuildable (10-15% band)
  setbacks_ft:
    well_head: 150                     # Texas RRC active wellheads (Eagle Ford)
    pipeline: 50                       # mapped high-pressure pipeline easements
    parcel_boundary: 100               # civil/zoning standard
    public_row: 150                    # public rights-of-way

# -----------------------------------------------------------------------------
# Base suitability model. Weights MUST sum to 1.0 (validated at load).
# -----------------------------------------------------------------------------
model:
  weights:
    interconnection:   0.35     # lead criterion — in ERCOT, the make-or-break
    buildable_acreage: 0.20
    terrain:           0.15
    landcover_soils:   0.10
    hazard_free:       0.10
    road_access:       0.05
    shape:             0.05

  # Step-4b normalization. Each entry maps a raw metric to 0-100 (higher better).
  normalization:

    interconnection:            # distance (mi) to nearest >=138 kV substation
      type: linear
      full_score_at: 1.0        # <=1 mi  -> 100
      zero_score_at: 10.0       # >=10 mi -> 0   (anchored to gen-tie ~$1.5-2.0M/mi)

    buildable_acreage:          # acres after exclusions/setbacks
      type: linear
      zero_score_at: 50.0       # at the floor -> 0
      full_score_at: 640.0      # >=640 ac -> 100 (~a 100 MW project @ ~7-9 ac/MWac)

    terrain:                    # mean slope %
      type: linear
      full_score_at: 2.0        # <=2%  -> 100
      zero_score_at: 5.0        # >=5%  -> 0  (single-axis-tracker threshold)

    road_access:                # distance (mi) to paved public road
      type: linear
      full_score_at: 0.5        # <=0.5 mi -> 100
      zero_score_at: 5.0        # >=5 mi   -> 0

    hazard_free:                # % of parcel OUTSIDE floodplain/wetlands
      type: identity            # 0..100 maps straight through

    shape:                      # Polsby-Popper compactness 0..1
      type: scale
      factor: 100.0

    landcover:                  # NLCD / CDL class -> score
      type: lookup
      table:
        pasture_hay:        90  # NLCD 81
        grassland_pasture:  85  # CDL 176
        shrubland:          75  # CDL 152
        cultivated_crops:   70  # NLCD 82
        developed_open:     30  # NLCD 21
        forest:             25  # NLCD 41-43
        developed:          10  # NLCD 22-24
        water:               0  # NLCD 11
        wetlands:            0  # NLCD 90/95
        default:            50

    soils_lcc:                  # NRCS non-irrigated Land Capability Class (1-8) -> score
      type: lookup             # marginal favored; prime farmland penalized
      table:
        "1":     30            # Class I  — prime farmland, penalized
        "2":     50            # Class II — good farmland
        "3":     90            # Class III — marginal, favored
        "4":     85            # Class IV — marginal, favored
        "5":     75            # Class V-VIII — non-cropland (range/pasture)
        "6":     75
        "7":     60
        "8":     55
        default: 60

  # How land cover and soils combine into the single 10% "landcover_soils" criterion.
  landcover_soils_blend:
    landcover_weight: 0.6
    soils_weight:     0.4

# -----------------------------------------------------------------------------
# Flexible / large-load lens (Feature #4). Re-weights the same normalized
# criteria; solar-yield and ag factors drop out. Weights sum to 1.0.
# -----------------------------------------------------------------------------
flex_load_lens:
  target_load_mw_default: 100         # drives the capital-hurdle card + SB6 logic
  weights:
    interconnection:       0.35       # proximity / headroom
    proximity_generation:  0.25       # co-location with existing/queued gen
    buildable_acreage:     0.20       # room for load + on-site gen
    curtailment_basis:     0.10       # negative-LMP / congested-node opportunity
    hazard_road:           0.10       # constructability

  large_load_threshold_mw: 75         # Texas SB 6 (enacted, eff. 2025-09-01)

  # Capital-hurdle estimate keyed to PUCT DRAFT rule 16 TAC 25.194 (Project 58481).
  # STATUS: DRAFT — proposed Mar 2026, final expected mid-2026. Figures are
  # PROPOSED, not enacted. Surface with a "draft" label in the UI.
  capital_hurdle:
    rule_status: draft
    interconnection_fee_per_mw_usd:   50000
    financial_security_per_mw_usd:    50000
    security_forfeit_pct:             0.80    # forfeited to TSP on withdrawal/reduction
    study_fee_usd:
      tier_75_to_250mw: 100000
      over_250mw:       300000
    ciac_pct: 1.00                            # 100% CIAC for radial lines + substations

# -----------------------------------------------------------------------------
# Agrivoltaics / whole-site stewardship lens (Feature #5). Deliberately inverts
# the base model's soil preference: here WORKING ag land scores high. Sum = 1.0.
# -----------------------------------------------------------------------------
agrivoltaic_lens:
  weights:
    grazing_forage:          0.30     # pasture/shrub cover -> solar-grazing fit
    existing_ag_continuity:  0.20     # currently farmed/grazed (acquisition lever)
    soil_water_stewardship:  0.20     # slope + drainage -> earthworks feasibility
    marginal_soil_pref:      0.15     # NRCS LCC III-IV favored
    pollinator_potential:    0.15

# -----------------------------------------------------------------------------
# Restricted-data discipline. Any capacity signal derived from the license-
# restricted ERCOT GIS Report is computed in the pipeline and surfaced ONLY as a
# 0-100 "Grid Connectivity Index" — never as raw ERCOT-model lines/names. The
# public map overlay uses HIFLD (public domain).
# -----------------------------------------------------------------------------
grid_connectivity:
  abstract_only: true
  output_range: [0, 100]

# -----------------------------------------------------------------------------
# Verdict layer (Feature A1). The model RANKS; the analyst DECIDES. These rules
# compute objective *flags* per parcel from the metrics above — they do not write
# a verdict. Authored verdicts (pursue / pursue-if / pass) live in
# web/data/verdicts.json, written parcel-by-parcel, never generated.
#
# Thresholds are ILLUSTRATIVE and defensible, not a production rule set — the
# real kill/caution criteria are employer- and deal-specific (same honesty
# stance as the model weights). Each flag carries a class: kill-risk | caution.
# -----------------------------------------------------------------------------
verdict_rules:
  prime_soil:                  # prime farmland — siting + community-relations risk
    soil_lcc_classes: ["1", "2"]
    class: kill-risk
  floodplain:                  # material floodplain share left after exclusions
    pct_over: 10.0
    class: kill-risk
  weak_interconnect:           # "near a substation" != "near power"
    min_kv: 138                # below 138 kV -> weak
    backbone_kv: 345           # if not on the 345 kV backbone...
    backbone_dist_mi: 2.0      # ...and >2 mi from transmission -> weak
    class: kill-risk
  poor_shape:                  # low compactness -> hard to lay out
    compactness_under: 0.5
    class: caution
  title_cloud:                 # any non-clear title flag
    class: caution
  price_rich:                  # priced well above the county shortlist norm
    median_multiple: 1.25
    class: caution
  # well_density (wells_within_parcel > 0): deferred — the RRC wellhead layer is
  # not fetched in this pass (mineral_excl_pct is null), so the flag is omitted
  # rather than faked. Lands when the wells layer is added to the pipeline.

# -----------------------------------------------------------------------------
# Deal economics (Feature A3). Development-margin / option economics — NOT
# stabilized-NOI. The SINGLE source of shared deal assumptions; A1.5 (portfolio)
# inherits this block untouched. Every value is ILLUSTRATIVE with a stated basis;
# sourced in docs RESEARCH_2026-06-11_deal-economics.md (Sonnet agents x Gemini x
# adversarial verifier). Pipeline/economics.py reads this; nothing is hard-coded.
# -----------------------------------------------------------------------------
deal_economics:
  disclosure: "All figures synthetic + illustrative; basis stated per line. Not investment advice."

  control:                      # flip control = data-center/large-load PURCHASE-option
    option_pct: 0.03            # ~3% of price (range 1-10%; transacted TX DC option ratios)
    option_pct_range: [0.01, 0.10]
    note: "Purchase-option, credited at closing if exercised, forfeit if abandoned."

  diligence_usd:                # verified subset — VERIFICATION_2026-06-11_permitting-guide
    phase_i_esa:        [4000, 10000]
    alta_survey:        [15000, 50000]
    wetland_delineation: [5000, 15000]
    title_cure_legal:   [5000, 20000]
    rrc_records:        [3500, 8000]
    geotech:            [15000, 45000]
    drainage_hh:        [25000, 75000]
  diligence_order_of_magnitude: [geotech, drainage_hh]   # flagged "order-of-magnitude" in UI

  carry:
    annual_rate: 0.12           # illustrative cost-of-capital on deployed dollars
    compounding: annual

  mw:
    ac_per_mw: 8                # NREL 7.5-8.3; real Eagle Ford projects 7.7-10 (Stockdale Novis Wilson 7.7)

  exit:
    time_to_power_months: [36, 48, 60]   # ERCOT queue-dependent; Batch-Zero-era estimates
    uplift_multiples: [2, 4, 6]          # raw->powered, base 4x; broker-observed ERCOT range, illustrative
    uplift_basis_note: "raw ~2-5K/ac -> NTP-ready ~15-20K/ac; broker-observed ERCOT range, not an appraised average. The 20-100x / 200K-1M per-ac figure is a different (metro/industrial DC) product and is NOT claimed here."
    ntp_fee_per_mw: [80000, 120000]      # per-MW NTP/RTB exit lens (Enerdatics 2026); early-stage ~20K/MW
    hurdle_irr: 0.25                     # illustrative IRR hurdle for the sensitivity overlay
    success_probability: 0.35            # illustrative chance-of-reaching-NTP-and-exit (industry 10-50%); risk-adjusted lens

  lease:                        # solar ground lease, tiered by interconnection quality
    tiers_usd_per_ac_yr:        # [low, high] by tier
      standard:        [300, 500]
      good_transmission: [500, 1000]
      near_substation: [1000, 1500]
      prime:           [1500, 2000]
    escalation_pct: 0.02
    term_years: 25
    structure: "NNN-style"
    rollback_note: "TX 1-d-1 open-space (Tax Code 23.51): 3-yr ag rollback + 7 pct interest, developer-indemnified."

  jv:                           # land-into-JV retained interest — softest panel, hedge hardest
    retained_pct: [0.05, 0.10, 0.15]     # low / base / high
    stabilized_share_pct: [0.02, 0.05]   # raw land share of stabilized value (solar 2-5pct; DC ~5pct, JetAI)
    per_mw_stabilized_usd: 1000000        # illustrative powered-land-stage value per MW (1-2M per MW)
    valuation_basis: "as-entitled (negotiated), not cost"
    note: "Most assumption-heavy. Energy land is usually leased/sold, not contributed — land-as-equity cuts ITC basis (HoldCo isolation is the workaround). No public energy comp; present as scenario with stated assumptions."

  portfolio:                    # Feature A1.5 — option-budget allocation across the shortlist
    budgets_usd: [250000, 500000, 1000000]   # stepped presets (no slider)
    priority: risk_adjusted     # rank eligible by best risk-adjusted return, within verdict tier
    exclude_verdicts: [pass]    # analyst's-call discipline: never allocate to a pass
    stage_top_n: 3              # stage diligence on the top-N controlled winners (by risk-adj return)
    disclosure: "Illustrative allocation; option capital deployed now, diligence staged as power validates. Synthetic + illustrative."

  incentives:
    note: "Section 151.359 sales-tax exemption + Ch. 312 abatement only (Ch. 312 up to 10 yr, local, school districts not eligible). JETI eligibility for data-center end-use is unsettled (Section 403.602); not assumed."

  sb6_framing: "Post-SB 6, large-load interconnection carries per-MW security and study costs borne by the end developer (PUCT Section 25.194 proposed rule, Project 58481; re-check ~July 2026). Direction only — figures not assumed."
