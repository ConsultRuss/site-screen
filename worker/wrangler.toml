# Cloudflare Worker — "Ask the map" natural-language -> filter DSL.
# The static site (Cloudflare Pages) POSTs a question here; the Worker returns a
# validated filter object the browser applies. The Worker never sees the data.
#
# The OpenRouter API key is NEVER committed — set it as a secret before deploy:
#   npx wrangler secret put OPENROUTER_API_KEY
name = "site-screen-ask"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Non-secret config. Models are pinned here (confirm exact slugs on
# openrouter.ai/models at setup — slugs drift). ZDR-compliant models so requests
# route under a Zero-Data-Retention provider policy. ALLOWED_ORIGINS restricts
# which sites the browser may call this Worker from (comma-separated).
[vars]
PRIMARY_MODEL = "meta-llama/llama-3.3-70b-instruct"
FALLBACK_MODEL = "meta-llama/llama-3.1-8b-instruct"
ALLOWED_ORIGINS = "https://sites.consultruss.com,http://localhost:8011"

# Per-IP rate limit: 12 requests / 60 s. Bounds cost/abuse on the key-holding
# endpoint; the browser falls back to its built-in parser when limited.
[[ratelimits]]
name = "ASK_RATE_LIMITER"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 12
  period = 60
